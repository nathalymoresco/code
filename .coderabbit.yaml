# CodeRabbit Configuration — code
# Generated by: @devops *setup-github (Story 5.10)
# Profile: balanced

version: "2"

language: "pt-BR"

reviews:
  profile: "balanced"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false

  path_instructions:
    - path: ".aiox-core/**"
      instructions: |
        Este é o core do framework AIOX. Foque em:
        - Qualidade de código, performance e segurança
        - Compatibilidade com a Constitution (NON-NEGOTIABLE principles)
        - Padrões de agentes e tasks (AIOX Task Format V1.0)
        - Error handling robusto

    - path: ".aiox-core/development/agents/**"
      instructions: |
        Definições de agentes AIOX em formato YAML/Markdown.
        Verifique: persona consistency, command completeness, dependency declarations.

    - path: ".aiox-core/development/tasks/**"
      instructions: |
        Tasks executáveis do AIOX. Verifique:
        - Presença de elicit, pre-conditions, post-conditions, acceptance-criteria
        - Instruções claras e executáveis
        - Compatibilidade com AIOX Task Format V1.0

    - path: "docs/**"
      instructions: |
        Documentação do projeto. Verifique clareza, completude e links válidos.

    - path: ".github/workflows/**"
      instructions: |
        GitHub Actions workflows. Verifique:
        - Sintaxe YAML correta
        - Versões de actions atualizadas
        - Segurança (não expor secrets em logs)

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - master
      - main
      - develop

chat:
  auto_reply: true
