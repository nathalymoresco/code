# =============================================================================
# CI - Fullstack (Node.js + Python) — code
# Generated by: @devops *setup-github (Story 5.10)
# =============================================================================

name: CI

on:
  push:
    branches:
      - master
      - main
      - develop
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - master
      - main
      - develop

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ===========================================================================
  # NODE.JS — Lint, TypeCheck, Test, Build
  # ===========================================================================
  lint:
    name: Lint (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: .aiox-core/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .aiox-core

      - name: Run ESLint
        run: npm run lint
        working-directory: .aiox-core

  typecheck:
    name: TypeCheck (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: .aiox-core/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .aiox-core

      - name: TypeScript type check
        run: npm run typecheck
        working-directory: .aiox-core

  test-node:
    name: Test (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: .aiox-core/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .aiox-core

      - name: Run tests
        run: npm test
        working-directory: .aiox-core

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: .aiox-core/coverage/lcov.info
          flags: node
          fail_ci_if_error: false
        continue-on-error: true

  build:
    name: Build (Node.js)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: .aiox-core/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .aiox-core

      - name: Build
        run: npm run build
        working-directory: .aiox-core

  # ===========================================================================
  # PYTHON — Lint, Test
  # ===========================================================================
  lint-python:
    name: Lint (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true

      - name: Check formatting (black)
        run: black --check .
        continue-on-error: true

  test-python:
    name: Test (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e ".[dev]"; fi

      - name: Run pytest
        run: |
          if find . -name "test_*.py" -o -name "*_test.py" | grep -q .; then
            python -m pytest --tb=short -q
          else
            echo "No Python tests found — skipping"
          fi
        continue-on-error: true

  # ===========================================================================
  # VALIDATION SUMMARY
  # ===========================================================================
  validation-summary:
    name: Validation Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-node, build, lint-python, test-python]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== CI Validation Summary ==="
          echo "Node Lint:     ${{ needs.lint.result }}"
          echo "TypeCheck:     ${{ needs.typecheck.result }}"
          echo "Node Tests:    ${{ needs.test-node.result }}"
          echo "Build:         ${{ needs.build.result }}"
          echo "Python Lint:   ${{ needs.lint-python.result }}"
          echo "Python Tests:  ${{ needs.test-python.result }}"

          # Block on Node essentials
          if [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.typecheck.result }}" = "failure" ] || \
             [ "${{ needs.test-node.result }}" = "failure" ] || \
             [ "${{ needs.build.result }}" = "failure" ]; then
            echo "❌ Node.js checks failed — blocking"
            exit 1
          fi

          echo "✅ All essential checks passed"
