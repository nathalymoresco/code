# =============================================================================
# PR Automation — code
# Generated by: @devops *setup-github (Story 5.10)
# =============================================================================

name: PR Automation

on:
  pull_request:
    branches:
      - master
      - main
      - develop
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

env:
  NODE_VERSION: '20'

jobs:
  # ===========================================================================
  # REQUIRED STATUS CHECKS
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: .aiox-core/package-lock.json
      - run: npm ci
        working-directory: .aiox-core
      - run: npm run lint
        working-directory: .aiox-core

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: .aiox-core/package-lock.json
      - run: npm ci
        working-directory: .aiox-core
      - run: npm run typecheck
        working-directory: .aiox-core

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      coverage-summary: ${{ steps.coverage.outputs.summary }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: .aiox-core/package-lock.json
      - run: npm ci
        working-directory: .aiox-core
      - run: npm test
        working-directory: .aiox-core

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: .aiox-core/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Extract coverage summary
        id: coverage
        run: |
          if [ -f .aiox-core/coverage/coverage-summary.json ]; then
            LINES=$(jq '.total.lines.pct' .aiox-core/coverage/coverage-summary.json)
            STATEMENTS=$(jq '.total.statements.pct' .aiox-core/coverage/coverage-summary.json)
            BRANCHES=$(jq '.total.branches.pct' .aiox-core/coverage/coverage-summary.json)
            FUNCTIONS=$(jq '.total.functions.pct' .aiox-core/coverage/coverage-summary.json)
            echo "summary=Lines: ${LINES}% | Statements: ${STATEMENTS}% | Branches: ${BRANCHES}% | Functions: ${FUNCTIONS}%" >> $GITHUB_OUTPUT
          else
            echo "summary=Coverage report not available" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # QUALITY SUMMARY COMMENT
  # ===========================================================================
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - name: Post quality summary
        uses: actions/github-script@v7
        with:
          script: |
            const lintResult = '${{ needs.lint.result }}';
            const typecheckResult = '${{ needs.typecheck.result }}';
            const testResult = '${{ needs.test.result }}';
            const coverage = '${{ needs.test.outputs.coverage-summary }}' || 'N/A';

            const getEmoji = (r) => ({success:'✅',failure:'❌',cancelled:'⏹️',skipped:'⏭️'}[r] || '⏳');
            const allPassed = [lintResult, typecheckResult, testResult].every(r => r === 'success');

            const body = `## 📋 Quality Gate Summary

            **Overall:** ${allPassed ? '✅ All checks passed — ready for review' : '❌ Some checks failed'}

            | Check | Status |
            |-------|--------|
            | Lint | ${getEmoji(lintResult)} ${lintResult} |
            | TypeCheck | ${getEmoji(typecheckResult)} ${typecheckResult} |
            | Tests | ${getEmoji(testResult)} ${testResult} |

            **Coverage:** ${coverage}

            ### CodeRabbit Review
            🐰 CodeRabbit will post automated review comments.
            - **CRITICAL** issues must be resolved before merge

            ---
            *Generated by AIOX PR Automation*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('📋 Quality Gate Summary')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Set final status
        if: always()
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ Quality gate failed"
            exit 1
          fi
          echo "✅ All quality gates passed"

  # ===========================================================================
  # CODERABBIT STATUS
  # ===========================================================================
  coderabbit-check:
    name: CodeRabbit Status
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .coderabbit.yaml
          sparse-checkout-cone-mode: false
      - run: |
          if [ -f ".coderabbit.yaml" ]; then
            echo "✅ CodeRabbit configuration found"
          else
            echo "⚠️ .coderabbit.yaml not found"
          fi
